<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">2026年6月22日18時投稿用 ゆるかん退勤イラスト</title>
  <desc id="desc">月曜18時、駅ホーム風の帰り道で、ゆるい3体のキャラクターが今日の自分をほめながら帰る横長イラスト。</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7d9a6"/>
      <stop offset="55%" stop-color="#ffd9c8"/>
      <stop offset="100%" stop-color="#f7f0de"/>
    </linearGradient>
    <linearGradient id="platform" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2e1c8"/>
      <stop offset="100%" stop-color="#dcc8aa"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#8f7755" flood-opacity="0.25"/>
    </filter>
    <style>
      .jp { font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Noto Sans CJK JP", "Noto Sans JP", sans-serif; }
      .line { stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#sky)"/>

  <!-- evening sun and clouds -->
  <circle cx="958" cy="132" r="74" fill="#ffb76f" opacity="0.72"/>
  <g fill="#fff4db" opacity="0.82">
    <ellipse cx="168" cy="104" rx="72" ry="24"/>
    <ellipse cx="224" cy="95" rx="54" ry="20"/>
    <ellipse cx="850" cy="91" rx="66" ry="22"/>
    <ellipse cx="902" cy="82" rx="45" ry="17"/>
  </g>

  <!-- station backdrop -->
  <rect x="0" y="404" width="1200" height="271" fill="url(#platform)"/>
  <rect x="0" y="379" width="1200" height="32" fill="#ad8d62" opacity="0.55"/>
  <path d="M0 505 H1200" stroke="#b69a70" stroke-width="5" opacity="0.42"/>
  <path d="M0 553 H1200" stroke="#c4a77d" stroke-width="3" stroke-dasharray="18 18" opacity="0.65"/>
  <g opacity="0.38" stroke="#8e795d" stroke-width="6">
    <path d="M70 378 V210 H1090 V378" fill="none"/>
    <path d="M208 210 V378"/>
    <path d="M390 210 V378"/>
    <path d="M574 210 V378"/>
    <path d="M758 210 V378"/>
    <path d="M942 210 V378"/>
  </g>
  <rect x="82" y="224" width="996" height="138" rx="18" fill="#fff7e7" opacity="0.56"/>
  <text x="600" y="292" text-anchor="middle" class="jp" font-size="48" font-weight="700" fill="#8a6644" opacity="0.72">月曜18時、帰り道に回復中</text>

  <!-- speech bubble -->
  <g filter="url(#softShadow)">
    <path d="M348 78 h504 a42 42 0 0 1 42 42 v92 a42 42 0 0 1-42 42 H611 l-47 54 -13 -54 H348 a42 42 0 0 1-42-42 v-92 a42 42 0 0 1 42-42z" fill="#fffdf5" stroke="#b88454" stroke-width="6"/>
    <text x="600" y="144" text-anchor="middle" class="jp" font-size="38" font-weight="700" fill="#6c4d35">今日の自分を定時でほめる。</text>
    <text x="600" y="198" text-anchor="middle" class="jp" font-size="34" fill="#8b674b">めんど…まぁ、帰るけど。</text>
  </g>

  <!-- characters shadows -->
  <g fill="#7d654a" opacity="0.18">
    <ellipse cx="407" cy="574" rx="103" ry="22"/>
    <ellipse cx="603" cy="584" rx="116" ry="24"/>
    <ellipse cx="797" cy="574" rx="103" ry="22"/>
  </g>

  <!-- left character -->
  <g filter="url(#softShadow)">
    <ellipse cx="407" cy="424" rx="92" ry="112" fill="#f6d38b" stroke="#7a5438" stroke-width="7"/>
    <circle cx="374" cy="400" r="9" fill="#5d412d"/>
    <circle cx="440" cy="400" r="9" fill="#5d412d"/>
    <path d="M382 445 q25 24 52 0" fill="none" stroke="#5d412d" stroke-width="8" class="line"/>
    <path d="M332 497 q-45 25-58 67" fill="none" stroke="#7a5438" stroke-width="13" class="line"/>
    <path d="M482 497 q38 22 61 61" fill="none" stroke="#7a5438" stroke-width="13" class="line"/>
    <rect x="323" y="529" width="168" height="42" rx="21" fill="#e7a95e" stroke="#7a5438" stroke-width="6"/>
  </g>

  <!-- center character -->
  <g filter="url(#softShadow)">
    <ellipse cx="603" cy="414" rx="103" ry="126" fill="#fff0be" stroke="#7a5438" stroke-width="7"/>
    <path d="M548 365 q55-40 110 0" fill="none" stroke="#7a5438" stroke-width="9" class="line"/>
    <circle cx="566" cy="401" r="10" fill="#5d412d"/>
    <circle cx="640" cy="401" r="10" fill="#5d412d"/>
    <path d="M580 450 q23 17 48 0" fill="none" stroke="#5d412d" stroke-width="8" class="line"/>
    <path d="M518 492 q-35 44-15 82" fill="none" stroke="#7a5438" stroke-width="13" class="line"/>
    <path d="M690 492 q42 25 61 68" fill="none" stroke="#7a5438" stroke-width="13" class="line"/>
    <rect x="529" y="539" width="148" height="45" rx="22" fill="#96c8a2" stroke="#7a5438" stroke-width="6"/>
  </g>

  <!-- right character -->
  <g filter="url(#softShadow)">
    <ellipse cx="797" cy="424" rx="92" ry="112" fill="#d9c4ee" stroke="#7a5438" stroke-width="7"/>
    <path d="M748 385 q48-25 98 0" fill="none" stroke="#7a5438" stroke-width="9" class="line"/>
    <circle cx="765" cy="405" r="9" fill="#5d412d"/>
    <circle cx="829" cy="405" r="9" fill="#5d412d"/>
    <path d="M773 449 q24 14 49 0" fill="none" stroke="#5d412d" stroke-width="8" class="line"/>
    <path d="M714 499 q-40 12-66 47" fill="none" stroke="#7a5438" stroke-width="13" class="line"/>
    <path d="M879 496 q46 22 70 58" fill="none" stroke="#7a5438" stroke-width="13" class="line"/>
    <rect x="716" y="528" width="164" height="43" rx="21" fill="#c49adf" stroke="#7a5438" stroke-width="6"/>
  </g>

  <!-- small props -->
  <g class="jp" fill="#6d4f36">
    <rect x="930" y="475" width="78" height="102" rx="12" fill="#6e8fb6" stroke="#6d4f36" stroke-width="6"/>
    <path d="M948 474 v-22 q0-28 22-28 t22 28 v22" fill="none" stroke="#6d4f36" stroke-width="8" class="line"/>
    <text x="970" y="535" text-anchor="middle" font-size="26" fill="#fff8df">帰</text>
    <text x="198" y="530" text-anchor="middle" font-size="28" font-weight="700">#ゆるかん</text>
  </g>
</svg>
